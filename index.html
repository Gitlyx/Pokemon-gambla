<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Adventure Wheel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: 'Press Start 2P', monospace;
  overflow-x: hidden;
  color: white;
}
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle 2s infinite alternate; }
@keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }

.screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.screen.active { opacity: 1; pointer-events: auto; }

/* INTRO */
.intro-content { text-align: center; max-width: 750px; padding: 20px; }
.intro-content h1 { color: #ffcb05; font-size: 26px; text-shadow: 3px 3px 0 #3466af; margin-bottom: 28px; }
.oak-dialogue { background: rgba(0,0,0,0.5); border: 3px solid #ffcb05; border-radius: 16px; padding: 24px; margin-bottom: 28px; }
.oak-avatar { font-size: 48px; margin-bottom: 10px; }
.oak-dialogue p { color: #a0c4ff; font-size: 10px; line-height: 2; margin-top: 6px; }
.starter-cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
.starter-card { background: rgba(0,0,0,0.4); border: 3px solid #555; border-radius: 16px; padding: 20px 28px; cursor: pointer; transition: all 0.3s; min-width: 170px; }
.starter-card:hover { border-color: #ffcb05; transform: translateY(-8px); box-shadow: 0 8px 25px rgba(255,203,5,0.3); }
.starter-art { width: 130px; height: 130px; object-fit: contain; display: block; margin: 0 auto 10px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5)); transition: transform 0.3s; }
.starter-card:hover .starter-art { transform: scale(1.1); }
.starter-name { color: white; font-size: 11px; margin-bottom: 8px; }
.starter-type { font-size: 8px; padding: 4px 12px; border-radius: 20px; display: inline-block; color: white; }
.starter-type.grass { background: #78C850; }
.starter-type.fire { background: #F08030; }
.starter-type.water { background: #6890F0; }

/* GAME LAYOUT */
.game-layout { display: flex; width: 100%; height: 100vh; }
.sidebar-left { width: 250px; min-width: 250px; padding: 14px; background: rgba(0,0,0,0.4); border-right: 2px solid #3466af; overflow-y: auto; }
.sidebar-left h3 { color: #ffcb05; font-size: 10px; text-align: center; padding-bottom: 8px; border-bottom: 2px solid #3466af; margin-bottom: 8px; }
.sidebar-left h4 { color: #ffcb05; font-size: 8px; margin: 10px 0 6px; }
.badge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.badge-slot { aspect-ratio: 1; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.badge-slot.earned { border-color: #ffcb05; background: rgba(255,203,5,0.1); }
.party-member { display: flex; align-items: center; gap: 6px; padding: 4px 6px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 4px; }
.pm-sprite { width: 40px; height: 40px; object-fit: contain; image-rendering: pixelated; }
.pm-info { flex: 1; }
.pm-name { color: white; font-size: 7px; }
.pm-level { color: #a0c4ff; font-size: 7px; margin-top: 2px; }
.pm-type { font-size: 6px; padding: 2px 6px; border-radius: 10px; color: white; margin-left: 4px; }
.bag-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 8px; color: #a0c4ff; }
.bag-item .count { color: #ffcb05; margin-left: auto; }
.bag-icon { width: 20px; height: 20px; object-fit: contain; image-rendering: pixelated; }
.stat-line { font-size: 7px; color: #555; margin-top: 10px; line-height: 1.8; }

.center-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; gap: 10px; }
.location-banner { color: #ffcb05; font-size: 13px; text-shadow: 2px 2px 0 #3466af; text-align: center; }
.gym-progress { color: #a0c4ff; font-size: 8px; text-align: center; min-height: 14px; }
.wheel-wrapper { position: relative; width: 380px; height: 380px; }
.pointer { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); z-index: 10; width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 34px solid #ffcb05; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
canvas { border-radius: 50%; box-shadow: 0 0 0 6px #ffcb05, 0 0 0 10px #3466af, 0 0 25px rgba(255,203,5,0.3); }
.button-row { display: flex; gap: 14px; align-items: center; }
.spin-btn, .gym-btn, .e4-btn { border: 3px solid #ffcb05; border-radius: 50px; padding: 12px 32px; font-family: 'Press Start 2P', monospace; font-size: 11px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; color: white; }
.spin-btn { background: linear-gradient(180deg, #ff1a1a, #cc0000); box-shadow: 0 4px 15px rgba(255,26,26,0.4); }
.gym-btn { background: linear-gradient(180deg, #3466af, #1a3a6e); box-shadow: 0 4px 15px rgba(52,102,175,0.4); }
.e4-btn { background: linear-gradient(180deg, #9C27B0, #6a1b7a); box-shadow: 0 4px 15px rgba(156,39,176,0.4); }
.spin-btn:hover:not(:disabled), .gym-btn:hover:not(:disabled), .e4-btn:hover:not(:disabled) { transform: scale(1.05); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
.result-box { background: rgba(0,0,0,0.6); border: 3px solid #ffcb05; border-radius: 16px; padding: 14px 22px; max-width: 500px; text-align: center; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.result-box.visible { opacity: 1; transform: translateY(0); }
.result-sprite { width: 80px; height: 80px; object-fit: contain; image-rendering: pixelated; display: none; }
.result-sprite.visible { display: block; animation: pop-in 0.3s ease; }
@keyframes pop-in { from { transform: scale(0); } to { transform: scale(1); } }
.result-box .event-name { color: #ffcb05; font-size: 11px; line-height: 1.6; }
.result-box .event-desc { color: #a0c4ff; font-size: 8px; line-height: 1.8; }

.sidebar-right { width: 210px; min-width: 210px; padding: 14px; background: rgba(0,0,0,0.4); border-left: 2px solid #3466af; overflow-y: auto; }
.sidebar-right h3 { color: #ffcb05; font-size: 9px; margin-bottom: 10px; text-align: center; }
.log-entry { color: #a0c4ff; font-size: 7px; padding: 4px 0; border-bottom: 1px solid rgba(52,102,175,0.3); line-height: 1.6; }
.log-entry .log-num { color: #ffcb05; }

/* GYM OVERLAY */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
.overlay.active { opacity: 1; pointer-events: auto; }
.gym-panel { background: linear-gradient(135deg, #1a1a2e, #0f3460); border: 4px solid #ffcb05; border-radius: 20px; padding: 36px; max-width: 480px; text-align: center; }
.gym-panel h2 { color: #ffcb05; font-size: 15px; margin-bottom: 6px; }
.gym-subtitle { color: #a0c4ff; font-size: 9px; margin-bottom: 18px; }
.gym-pokemon-art { width: 180px; height: 180px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 4px 20px rgba(255,203,5,0.3)); animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.gym-dialogue { color: white; font-size: 9px; line-height: 2; margin-bottom: 18px; padding: 14px; background: rgba(0,0,0,0.3); border-radius: 12px; min-height: 50px; }
.gym-result { font-size: 14px; margin-bottom: 14px; line-height: 2; }
.gym-result.win { color: #4CAF50; }
.gym-result.lose { color: #f44336; }
.gym-badge-reward { font-size: 10px; color: #ffcb05; margin-bottom: 18px; }
.continue-btn { background: linear-gradient(180deg, #ffcb05, #e6a800); color: #1a1a2e; border: none; border-radius: 50px; padding: 12px 32px; font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; transition: all 0.2s; }
.continue-btn:hover { transform: scale(1.05); }

/* VICTORY */
.victory-content { text-align: center; z-index: 2; padding: 20px; }
.victory-content h1 { color: #ffcb05; font-size: 22px; text-shadow: 3px 3px 0 #3466af; margin-bottom: 14px; }
.victory-content h2 { color: white; font-size: 13px; margin-bottom: 20px; }
.hall-of-fame { background: rgba(0,0,0,0.5); border: 3px solid #ffcb05; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
.hof-team { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.hof-pokemon { text-align: center; padding: 8px; }
.hof-art { width: 90px; height: 90px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(255,203,5,0.4)); }
.hof-name { color: white; font-size: 8px; margin-top: 4px; }
.hof-level { color: #a0c4ff; font-size: 7px; }
.victory-badges { margin-top: 14px; font-size: 22px; letter-spacing: 8px; }
.confetti { position: fixed; z-index: 1; animation: confetti-fall linear forwards; }
@keyframes confetti-fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

/* E4 member display */
.e4-pokemon-art { width: 100px; height: 100px; object-fit: contain; margin: 8px auto; display: block; filter: drop-shadow(0 2px 10px rgba(255,203,5,0.3)); transition: opacity 0.4s; }

@media (max-width: 900px) {
  .sidebar-left, .sidebar-right { display: none; }
  .wheel-wrapper { width: 320px; height: 320px; }
  .intro-content h1 { font-size: 18px; }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div id="screen-intro" class="screen active">
  <div class="intro-content">
    <h1>Pokemon<br>Adventure Wheel</h1>
    <div class="oak-dialogue">
      <div class="oak-avatar">&#x1F468;&#x200D;&#x1F52C;</div>
      <p>Hello there! Welcome to the world of Pokemon!</p>
      <p>My name is Oak. People call me the Pokemon Professor.</p>
      <p>Your very own Pokemon legend is about to unfold! Choose your first partner!</p>
    </div>
    <div class="starter-cards">
      <div class="starter-card" onclick="chooseStarter(0)">
        <img class="starter-art" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png" alt="Bulbasaur">
        <div class="starter-name">Bulbasaur</div>
        <div class="starter-type grass">Grass</div>
      </div>
      <div class="starter-card" onclick="chooseStarter(1)">
        <img class="starter-art" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/4.png" alt="Charmander">
        <div class="starter-name">Charmander</div>
        <div class="starter-type fire">Fire</div>
      </div>
      <div class="starter-card" onclick="chooseStarter(2)">
        <img class="starter-art" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/7.png" alt="Squirtle">
        <div class="starter-name">Squirtle</div>
        <div class="starter-type water">Water</div>
      </div>
    </div>
  </div>
</div>

<div id="screen-game" class="screen">
  <div class="game-layout">
    <div class="sidebar-left" id="sidebarLeft"></div>
    <div class="center-area">
      <div class="location-banner" id="location"></div>
      <div class="gym-progress" id="gymProgress"></div>
      <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheel" width="380" height="380"></canvas>
      </div>
      <div class="button-row" id="buttonRow"></div>
      <div class="result-box" id="result">
        <img class="result-sprite" id="resultSprite">
        <div class="event-name" id="eventName">Spin the wheel to explore!</div>
        <div class="event-desc" id="eventDesc"></div>
      </div>
    </div>
    <div class="sidebar-right">
      <h3>Adventure Log</h3>
      <div id="log"></div>
    </div>
  </div>
</div>

<div id="gymOverlay" class="overlay"></div>
<div id="screen-victory" class="screen"></div>

<script>
// ===== POKEAPI HELPERS =====
const SPRITE_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/';
const ITEM_BASE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/';
function spriteUrl(id) { return SPRITE_BASE + id + '.png'; }
function artworkUrl(id) { return SPRITE_BASE + 'other/official-artwork/' + id + '.png'; }
function cryUrl(id) { return 'https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/' + id + '.ogg'; }
function playCry(id) {
  try { const a = new Audio(cryUrl(id)); a.volume = 0.3; a.play().catch(function(){}); } catch(e) {}
}

// ===== DATA =====
const STARTERS = [
  { name:'Bulbasaur', type:'Grass', id:1, evolutions:[{level:16,name:'Ivysaur',id:2},{level:32,name:'Venusaur',id:3}] },
  { name:'Charmander', type:'Fire', id:4, evolutions:[{level:16,name:'Charmeleon',id:5},{level:36,name:'Charizard',id:6}] },
  { name:'Squirtle', type:'Water', id:7, evolutions:[{level:16,name:'Wartortle',id:8},{level:36,name:'Blastoise',id:9}] },
];

const WILD_POKEMON = [
  [ // Tier 0: early routes
    {name:'Pidgey',type:'Normal',id:16,catchRate:80,evolutions:[{level:18,name:'Pidgeotto',id:17}]},
    {name:'Rattata',type:'Normal',id:19,catchRate:85,evolutions:[{level:20,name:'Raticate',id:20}]},
    {name:'Caterpie',type:'Bug',id:10,catchRate:90,evolutions:[{level:10,name:'Butterfree',id:12}]},
    {name:'Pikachu',type:'Electric',id:25,catchRate:45,evolutions:[{level:22,name:'Raichu',id:26}]},
    {name:'Nidoran\u2642',type:'Poison',id:32,catchRate:70,evolutions:[{level:16,name:'Nidorino',id:33}]},
    {name:'Spearow',type:'Normal',id:21,catchRate:75,evolutions:[{level:20,name:'Fearow',id:22}]},
  ],
  [ // Tier 1: mid routes
    {name:'Geodude',type:'Rock',id:74,catchRate:70,evolutions:[{level:25,name:'Graveler',id:75}]},
    {name:'Abra',type:'Psychic',id:63,catchRate:35,evolutions:[{level:16,name:'Kadabra',id:64}]},
    {name:'Machop',type:'Fighting',id:66,catchRate:65,evolutions:[{level:28,name:'Machoke',id:67}]},
    {name:'Vulpix',type:'Fire',id:37,catchRate:55,evolutions:[{level:28,name:'Ninetales',id:38}]},
    {name:'Growlithe',type:'Fire',id:58,catchRate:50,evolutions:[{level:30,name:'Arcanine',id:59}]},
    {name:'Oddish',type:'Grass',id:43,catchRate:75,evolutions:[{level:21,name:'Gloom',id:44}]},
  ],
  [ // Tier 2: late routes
    {name:'Ponyta',type:'Fire',id:77,catchRate:55,evolutions:[{level:40,name:'Rapidash',id:78}]},
    {name:'Magnemite',type:'Electric',id:81,catchRate:60,evolutions:[{level:30,name:'Magneton',id:82}]},
    {name:'Gastly',type:'Ghost',id:92,catchRate:50,evolutions:[{level:25,name:'Haunter',id:93}]},
    {name:'Staryu',type:'Water',id:120,catchRate:55,evolutions:[{level:30,name:'Starmie',id:121}]},
    {name:'Eevee',type:'Normal',id:133,catchRate:40,evolutions:[{level:28,name:'Flareon',id:136}]},
    {name:'Magikarp',type:'Water',id:129,catchRate:95,evolutions:[{level:20,name:'Gyarados',id:130}]},
  ],
  [ // Tier 3: endgame
    {name:'Dratini',type:'Dragon',id:147,catchRate:30,evolutions:[{level:30,name:'Dragonair',id:148}]},
    {name:'Lapras',type:'Water',id:131,catchRate:35,evolutions:[]},
    {name:'Snorlax',type:'Normal',id:143,catchRate:25,evolutions:[]},
    {name:'Electabuzz',type:'Electric',id:125,catchRate:40,evolutions:[]},
    {name:'Scyther',type:'Bug',id:123,catchRate:35,evolutions:[]},
    {name:'Jynx',type:'Psychic',id:124,catchRate:40,evolutions:[]},
  ],
];

const GYMS = [
  {leader:'Brock',city:'Pewter City',type:'Rock',badge:'Boulder',pokemonId:95,threshold:12,
   intro:"I'm Brock! My rock-hard determination is evident in my Pokemon!",
   win:"Your Pokemon's prowess is remarkable! Take this Boulder Badge!"},
  {leader:'Misty',city:'Cerulean City',type:'Water',badge:'Cascade',pokemonId:121,threshold:25,
   intro:"My policy is an all-out offensive with water-type Pokemon!",
   win:"Wow! You're too much! Fine, take the Cascade Badge!"},
  {leader:'Lt. Surge',city:'Vermilion City',type:'Electric',badge:'Thunder',pokemonId:26,threshold:40,
   intro:"Hey kid! What do you think you're doing here?",
   win:"Now that's a Pokemon trainer! Take the Thunder Badge, baby!"},
  {leader:'Erika',city:'Celadon City',type:'Grass',badge:'Rainbow',pokemonId:45,threshold:55,
   intro:"I'm Erika, the nature-loving princess!",
   win:"Oh! You're remarkable! Take the Rainbow Badge."},
  {leader:'Koga',city:'Fuchsia City',type:'Poison',badge:'Soul',pokemonId:110,threshold:75,
   intro:"A ninja must see through deception. Can you?",
   win:"You have proven your worth. Take the Soul Badge."},
  {leader:'Sabrina',city:'Saffron City',type:'Psychic',badge:'Marsh',pokemonId:65,threshold:95,
   intro:"I had a vision of your arrival. I foresaw your defeat!",
   win:"Your power reminds me of when I was young. Take the Marsh Badge."},
  {leader:'Blaine',city:'Cinnabar Island',type:'Fire',badge:'Volcano',pokemonId:59,threshold:115,
   intro:"Hah! I'm Blaine, the hotheaded quiz master!",
   win:"You've earned the Volcano Badge! Your passion burns bright!"},
  {leader:'Giovanni',city:'Viridian City',type:'Ground',badge:'Earth',pokemonId:112,threshold:140,
   intro:"So! You've finally arrived! I am the boss of Team Rocket!",
   win:"Ha! That was a truly intense battle! Take this Earth Badge."},
];

const ELITE_FOUR = [
  {name:'Lorelei',type:'Ice',pokemonId:131},
  {name:'Bruno',type:'Fighting',pokemonId:68},
  {name:'Agatha',type:'Ghost',pokemonId:94},
  {name:'Lance',type:'Dragon',pokemonId:149},
  {name:'Champion Blue',type:'Various',pokemonId:18},
];
const E4_THRESHOLD = 180;

const ROUTES = [
  'Route 1 \u2014 Pallet Town','Route 3 \u2014 Mt. Moon','Route 5 \u2014 Underground Path',
  'Route 8 \u2014 Celadon Outskirts','Route 12 \u2014 Silence Bridge','Route 16 \u2014 Cycling Road',
  'Route 20 \u2014 Seafoam Islands','Route 22 \u2014 Victory Road','Indigo Plateau',
];

const TM_MOVES = ['Flamethrower','Ice Beam','Thunderbolt','Earthquake','Psychic','Shadow Ball','Surf','Solar Beam','Hyper Beam','Dragon Pulse','Fire Blast','Blizzard','Thunder','Dig','Toxic'];

const TYPE_COLORS = {Normal:'#A8A878',Fire:'#F08030',Water:'#6890F0',Grass:'#78C850',Electric:'#F8D030',Rock:'#B8A038',Poison:'#A040A0',Psychic:'#F85888',Fighting:'#C03028',Bug:'#A8B820',Ghost:'#705898',Dragon:'#7038F8',Ice:'#98D8D8',Ground:'#E0C068'};

const WHEEL_EVENTS = [
  {name:'Wild Pokemon',color:'#4CAF50'},
  {name:'Trainer Battle',color:'#f44336'},
  {name:'Team Rocket',color:'#9C27B0'},
  {name:'Rival Battle',color:'#FF5722'},
  {name:'Potion',color:'#E91E63'},
  {name:'Rare Candy',color:'#FF9800'},
  {name:'Poke Center',color:'#2196F3'},
  {name:'Found TM',color:'#795548'},
  {name:'Berry Harvest',color:'#8BC34A'},
  {name:'Evolution',color:'#00BCD4'},
];
const NUM_SLICES = WHEEL_EVENTS.length;
const ARC = (2 * Math.PI) / NUM_SLICES;

// ===== GAME STATE =====
let game = { phase:'intro', party:[], badges:[], bag:{potions:0,berries:0}, currentGym:0, spinsOnRoute:0, totalSpins:0, log:[] };

// ===== SCREENS =====
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ===== STARTER =====
function chooseStarter(i) {
  var s = STARTERS[i];
  game.party.push({ name:s.name, type:s.type, id:s.id, level:5, evolutions:JSON.parse(JSON.stringify(s.evolutions)) });
  game.phase = 'route';
  playCry(s.id);
  addLog('Received ' + s.name + ' from Prof. Oak!');
  addLog('Your adventure begins!');
  switchScreen('screen-game');
  updateUI();
  drawWheel();
}

// ===== WHEEL DRAWING =====
var canvas = document.getElementById('wheel');
var ctx = canvas.getContext('2d');
var currentAngle = 0;
var spinning = false;

function drawWheel() {
  var cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 4;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (var i = 0; i < NUM_SLICES; i++) {
    var sa = currentAngle + i * ARC, ea = sa + ARC;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, sa, ea); ctx.closePath();
    ctx.fillStyle = WHEEL_EVENTS[i].color; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(sa + ARC / 2);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 9px "Press Start 2P", monospace';
    ctx.textAlign = 'right'; ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 4;
    ctx.fillText(WHEEL_EVENTS[i].name, r - 14, 4); ctx.restore();
  }
  // Pokeball center
  ctx.beginPath(); ctx.arc(cx,cy,26,0,2*Math.PI); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=3; ctx.stroke();
  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,24,Math.PI,0); ctx.closePath(); ctx.fillStyle='#ff1a1a'; ctx.fill(); ctx.restore();
  ctx.beginPath(); ctx.moveTo(cx-26,cy); ctx.lineTo(cx+26,cy); ctx.strokeStyle='#333'; ctx.lineWidth=3; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,9,0,2*Math.PI); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=3; ctx.stroke();
}

// ===== SPIN =====
function spin() {
  if (spinning) return;
  spinning = true;
  setButtonsDisabled(true);
  document.getElementById('result').classList.remove('visible');
  var dur = 3500 + Math.random() * 2000, rot = (5 + Math.random() * 5) * 2 * Math.PI;
  var sa = currentAngle, st = performance.now();
  function ease(t) { return 1 - Math.pow(1 - t, 3); }
  function anim(now) {
    var p = Math.min((now - st) / dur, 1);
    currentAngle = sa + rot * ease(p);
    drawWheel();
    if (p < 1) requestAnimationFrame(anim);
    else { spinning = false; setButtonsDisabled(false); onSpinComplete(); }
  }
  requestAnimationFrame(anim);
}

function setButtonsDisabled(d) {
  document.querySelectorAll('.button-row button').forEach(function(b) { b.disabled = d; });
}

function getWheelResult() {
  var n = ((2*Math.PI) - (currentAngle % (2*Math.PI)) + (2*Math.PI)) % (2*Math.PI);
  return Math.floor(((n + Math.PI/2) % (2*Math.PI)) / ARC) % NUM_SLICES;
}

// ===== EVENT DISPATCH =====
function onSpinComplete() {
  var idx = getWheelResult();
  game.totalSpins++;
  game.spinsOnRoute++;
  var handlers = [handleWild, handleTrainer, handleRocket, handleRival, handlePotion, handleCandy, handleCenter, handleTM, handleBerry, handleEvo];
  var r = handlers[idx]();
  showResult(r.title, r.desc, r.spriteId);
  addLog(r.title);
  updateUI();
}

// ===== EVENT HANDLERS =====
function handleWild() {
  var tier = Math.min(3, Math.floor(game.currentGym / 2));
  var pool = WILD_POKEMON[tier];
  var t = pool[Math.floor(Math.random() * pool.length)];
  var lvl = 3 + game.currentGym * 4 + Math.floor(Math.random() * 3);
  if (game.party.length >= 6) {
    var r = levelUpRandom(1);
    return {title:'Wild ' + t.name + ' appeared!', desc:'Party is full! You battled it instead. ' + r.msg, spriteId: t.id};
  }
  if (Math.random() * 100 < t.catchRate) {
    game.party.push({name:t.name, type:t.type, id:t.id, level:lvl, evolutions:JSON.parse(JSON.stringify(t.evolutions))});
    playCry(t.id);
    return {title:'Wild ' + t.name + ' appeared!', desc:'You threw a Pokeball... Gotcha! ' + t.name + ' was caught! (Lv.' + lvl + ')', spriteId: t.id};
  }
  return {title:'Wild ' + t.name + ' appeared!', desc:'You threw a Pokeball... Oh no! ' + t.name + ' broke free and fled!', spriteId: t.id};
}

function handleTrainer() {
  var r = levelUpRandom(Math.random() < 0.5 ? 1 : 2);
  return {title:'\u2694\uFE0F Trainer Battle!', desc:'You defeated a trainer! ' + r.msg, spriteId: r.id};
}

function handleRocket() {
  var r = levelUpRandom(Math.random() < 0.5 ? 1 : 2);
  game.bag.potions++;
  return {title:'\u{1F680} Team Rocket appeared!', desc:'"Prepare for trouble!" You sent them blasting off! ' + r.msg + ' Found a Potion!', spriteId: r.id};
}

function handleRival() {
  var r = levelUpRandom(2 + Math.floor(Math.random() * 2));
  return {title:'\u{1F3C6} Rival Battle!', desc:'Your rival Blue appeared! "Smell ya later!" You won! ' + r.msg, spriteId: r.id};
}

function handlePotion() {
  game.bag.potions++;
  return {title:'\u{1F48A} Found a Potion!', desc:'You picked up a Potion! (Bag: ' + game.bag.potions + ') Useful for Gym battles!'};
}

function handleCandy() {
  if (!game.party.length) return {title:'\u{1F36C} Rare Candy!', desc:'But you have no Pokemon!'};
  var p = game.party.reduce(function(a,b) { return a.level <= b.level ? a : b; });
  p.level++;
  var e = checkEvo(p);
  return {title:'\u{1F36C} Rare Candy!', desc:p.name + ' grew to Lv.' + p.level + '!' + e, spriteId: p.id};
}

function handleCenter() {
  var p = game.party.reduce(function(a,b) { return a.level <= b.level ? a : b; });
  p.level++;
  var e = checkEvo(p);
  return {title:'\u{1F3E5} Pokemon Center!', desc:'Nurse Joy: "Your Pokemon are fighting fit!" ' + p.name + ' grew to Lv.' + p.level + '!' + e, spriteId: p.id};
}

function handleTM() {
  var move = TM_MOVES[Math.floor(Math.random() * TM_MOVES.length)];
  var p = game.party[Math.floor(Math.random() * game.party.length)];
  p.level += 2;
  var e = checkEvo(p);
  return {title:'\u{1F4BF} Found a TM!', desc:p.name + ' learned ' + move + '! Grew to Lv.' + p.level + '!' + e, spriteId: p.id};
}

function handleBerry() {
  game.bag.berries += 2;
  return {title:'\u{1F347} Berry Harvest!', desc:'You gathered berries! (Bag: ' + game.bag.berries + ') They help in Gym battles!'};
}

function handleEvo() {
  for (var i = 0; i < game.party.length; i++) {
    var p = game.party[i];
    if (p.evolutions && p.evolutions.length && p.level >= p.evolutions[0].level) {
      var old = p.name, ev = p.evolutions.shift();
      p.name = ev.name; p.id = ev.id;
      playCry(p.id);
      return {title:'\u2728 Evolution!', desc:'What? ' + old + ' is evolving! Congratulations! It became ' + p.name + '!', spriteId: p.id};
    }
  }
  var r = levelUpRandom(1);
  return {title:'\u2728 Training Time!', desc:'No Pokemon ready to evolve. Your team trained hard! ' + r.msg, spriteId: r.id};
}

// ===== HELPERS =====
function levelUpRandom(amt) {
  if (!game.party.length) return {msg:'', id:null};
  var p = game.party[Math.floor(Math.random() * game.party.length)];
  p.level += amt;
  var e = checkEvo(p);
  return {msg: p.name + ' grew to Lv.' + p.level + '!' + e, id: p.id};
}

function checkEvo(p) {
  if (p.evolutions && p.evolutions.length && p.level >= p.evolutions[0].level) {
    var old = p.name, ev = p.evolutions.shift();
    p.name = ev.name; p.id = ev.id;
    playCry(p.id);
    return ' \u2728 ' + old + ' evolved into ' + p.name + '!';
  }
  return '';
}

function getTotalLevel() { return game.party.reduce(function(s,p) { return s + p.level; }, 0); }

function addLog(msg) { game.log.unshift({num: game.log.length + 1, text: msg}); }

function showResult(t, d, sid) {
  var sprite = document.getElementById('resultSprite');
  if (sid) {
    sprite.src = spriteUrl(sid);
    sprite.className = 'result-sprite visible';
    sprite.onerror = function() { this.className = 'result-sprite'; };
  } else {
    sprite.className = 'result-sprite';
  }
  document.getElementById('eventName').textContent = t;
  document.getElementById('eventDesc').textContent = d;
  document.getElementById('result').classList.add('visible');
}

// ===== GYM BATTLE =====
function challengeGym() {
  var gym = GYMS[game.currentGym];
  var eff = getTotalLevel() + game.bag.potions * 5 + game.bag.berries * 3;
  var wc = eff >= gym.threshold ? 85 : eff >= gym.threshold * 0.8 ? 60 : eff >= gym.threshold * 0.6 ? 35 : 15;
  var won = Math.random() * 100 < wc;
  game.bag.potions = 0; game.bag.berries = 0;
  showGymOverlay(gym, won);
}

function showGymOverlay(gym, won) {
  var o = document.getElementById('gymOverlay');
  o.innerHTML =
    '<div class="gym-panel">' +
      '<img class="gym-pokemon-art" src="' + artworkUrl(gym.pokemonId) + '" alt="' + gym.leader + ' Pokemon" onerror="this.style.display=\'none\'">' +
      '<h2>' + gym.city + ' Gym</h2>' +
      '<div class="gym-subtitle">' + gym.leader + ' \u2014 ' + gym.type + ' Type</div>' +
      '<div class="gym-dialogue" id="gd">' + gym.intro + '</div>' +
      '<div class="gym-result" id="gr" style="display:none"></div>' +
      '<div id="gbr" style="display:none"></div>' +
      '<button class="continue-btn" id="gc" style="display:none" onclick="closeGym(' + won + ')">Continue</button>' +
    '</div>';
  o.classList.add('active');
  playCry(gym.pokemonId);
  setTimeout(function() {
    var gr = document.getElementById('gr');
    gr.style.display = 'block';
    if (won) {
      gr.className = 'gym-result win'; gr.textContent = 'YOU WIN!';
      setTimeout(function() {
        document.getElementById('gd').textContent = gym.win;
        var b = document.getElementById('gbr');
        b.style.display = 'block'; b.className = 'gym-badge-reward';
        b.textContent = gym.badge + ' Badge earned!';
        document.getElementById('gc').style.display = 'inline-block';
      }, 1000);
    } else {
      gr.className = 'gym-result lose'; gr.textContent = 'DEFEATED...';
      setTimeout(function() {
        document.getElementById('gd').textContent = "Your team wasn't strong enough! Keep training and come back!";
        document.getElementById('gc').style.display = 'inline-block';
      }, 1000);
    }
  }, 1500);
}

function closeGym(won) {
  document.getElementById('gymOverlay').classList.remove('active');
  if (won) {
    var gym = GYMS[game.currentGym];
    game.badges.push({name: gym.badge, pokemonId: gym.pokemonId});
    game.currentGym++;
    game.spinsOnRoute = 0;
    addLog(gym.badge + ' Badge earned! Defeated ' + gym.leader + '!');
    game.party.forEach(function(p) { p.level += 2; checkEvo(p); });
    if (game.currentGym >= GYMS.length) {
      game.phase = 'elite4';
      addLog('All 8 badges collected! The Elite Four await!');
    }
  } else {
    addLog('Lost to ' + GYMS[game.currentGym].leader + '... Need more training!');
  }
  updateUI();
}

// ===== ELITE FOUR =====
function challengeE4() {
  var eff = getTotalLevel() + game.bag.potions * 5 + game.bag.berries * 3;
  var won = eff >= E4_THRESHOLD || Math.random() * 100 < 40;
  game.bag.potions = 0; game.bag.berries = 0;
  showE4Overlay(won);
}

function showE4Overlay(won) {
  var o = document.getElementById('gymOverlay');
  o.innerHTML =
    '<div class="gym-panel">' +
      '<img class="gym-pokemon-art" src="' + artworkUrl(149) + '" alt="Elite Four" onerror="this.style.display=\'none\'">' +
      '<h2>The Elite Four</h2>' +
      '<div class="gym-subtitle">Indigo Plateau \u2014 Final Challenge</div>' +
      '<div class="gym-dialogue" id="gd">The strongest trainers in Kanto await...</div>' +
      '<div id="e4art"></div>' +
      '<div class="gym-result" id="gr" style="display:none"></div>' +
      '<button class="continue-btn" id="gc" style="display:none">Continue</button>' +
    '</div>';
  o.classList.add('active');
  var delay = 1500;
  ELITE_FOUR.forEach(function(m, i) {
    setTimeout(function() {
      var gd = document.getElementById('gd');
      var artEl = document.getElementById('e4art');
      if (won || i < ELITE_FOUR.length - 1) {
        gd.textContent = m.name + ' (' + m.type + ')... Defeated!';
        artEl.innerHTML = '<img class="e4-pokemon-art" src="' + artworkUrl(m.pokemonId) + '" onerror="this.style.display=\'none\'">';
      } else {
        gd.textContent = m.name + ' was too powerful!';
        artEl.innerHTML = '<img class="e4-pokemon-art" src="' + artworkUrl(m.pokemonId) + '" onerror="this.style.display=\'none\'">';
      }
      playCry(m.pokemonId);
    }, delay + i * 1200);
  });
  setTimeout(function() {
    var gr = document.getElementById('gr');
    gr.style.display = 'block';
    var gc = document.getElementById('gc');
    if (won) {
      gr.className = 'gym-result win'; gr.textContent = 'YOU ARE THE CHAMPION!';
      gc.onclick = showVictory;
    } else {
      gr.className = 'gym-result lose'; gr.textContent = 'DEFEATED...';
      document.getElementById('gd').textContent += ' Keep training and try again!';
      gc.onclick = function() { o.classList.remove('active'); addLog('Lost to the Elite Four...'); updateUI(); };
    }
    gc.style.display = 'inline-block';
  }, delay + ELITE_FOUR.length * 1200 + 500);
}

// ===== VICTORY =====
function showVictory() {
  document.getElementById('gymOverlay').classList.remove('active');
  game.phase = 'victory';
  var team = game.party.map(function(p) {
    return '<div class="hof-pokemon"><img class="hof-art" src="' + artworkUrl(p.id) + '" alt="' + p.name + '" onerror="this.style.display=\'none\'"><div class="hof-name">' + p.name + '</div><div class="hof-level">Lv.' + p.level + '</div></div>';
  }).join('');
  var badgeSprites = game.badges.map(function(b) {
    return '<img src="' + spriteUrl(b.pokemonId) + '" style="width:36px;height:36px;image-rendering:pixelated" onerror="this.style.display=\'none\'">';
  }).join(' ');
  document.getElementById('screen-victory').innerHTML =
    '<div class="victory-content">' +
      '<h1>\u{1F3C6} HALL OF FAME \u{1F3C6}</h1>' +
      '<h2>Congratulations, Champion Red!</h2>' +
      '<div class="hall-of-fame"><div class="hof-team">' + team + '</div></div>' +
      '<div class="victory-badges">' + badgeSprites + '</div>' +
      '<p style="color:#a0c4ff;font-size:9px;margin-top:18px;line-height:2">Total spins: ' + game.totalSpins + ' | Pokemon caught: ' + game.party.length + '</p>' +
      '<button class="continue-btn" style="margin-top:20px" onclick="newGame()">New Game</button>' +
    '</div>';
  switchScreen('screen-victory');
  launchConfetti();
}

function launchConfetti() {
  var colors = ['#ffcb05','#f44336','#4CAF50','#2196F3','#FF9800','#9C27B0','#E91E63'];
  for (var i = 0; i < 60; i++) {
    var el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = Math.random() * 2 + 's';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(el);
  }
  setTimeout(function() {
    document.querySelectorAll('.confetti').forEach(function(el) { el.remove(); });
  }, 6000);
}

function newGame() {
  game = {phase:'intro',party:[],badges:[],bag:{potions:0,berries:0},currentGym:0,spinsOnRoute:0,totalSpins:0,log:[]};
  currentAngle = 0;
  switchScreen('screen-intro');
}

// ===== UI UPDATE =====
function updateUI() {
  // Location
  var loc = game.currentGym < ROUTES.length ? ROUTES[game.currentGym] : ROUTES[ROUTES.length - 1];
  document.getElementById('location').textContent = loc;

  // Progress
  var gp = document.getElementById('gymProgress');
  if (game.phase === 'elite4') {
    gp.textContent = 'All 8 badges earned! Challenge the Elite Four!';
    gp.style.color = '#FFD700';
  } else if (game.spinsOnRoute < 3) {
    var left = 3 - game.spinsOnRoute;
    gp.textContent = 'Spin ' + left + ' more time' + (left !== 1 ? 's' : '') + ' before the Gym!';
    gp.style.color = '#a0c4ff';
  } else {
    var gym = GYMS[game.currentGym];
    gp.textContent = gym.leader + ' is waiting at ' + gym.city + ' Gym!';
    gp.style.color = '#4CAF50';
  }

  // Buttons
  var br = document.getElementById('buttonRow');
  var bh = '<button class="spin-btn" onclick="spin()">Spin!</button>';
  if (game.phase === 'elite4') bh += ' <button class="e4-btn" onclick="challengeE4()">Elite Four!</button>';
  else if (game.spinsOnRoute >= 3 && game.currentGym < GYMS.length) bh += ' <button class="gym-btn" onclick="challengeGym()">Challenge ' + GYMS[game.currentGym].leader + '!</button>';
  br.innerHTML = bh;

  // Sidebar
  var sb = document.getElementById('sidebarLeft');
  var badgeH = '';
  for (var i = 0; i < 8; i++) {
    if (i < game.badges.length) {
      badgeH += '<div class="badge-slot earned"><img src="' + spriteUrl(game.badges[i].pokemonId) + '" style="width:32px;height:32px;image-rendering:pixelated" onerror="this.outerHTML=\'&#x2B50;\'"></div>';
    } else {
      badgeH += '<div class="badge-slot" style="color:#444">?</div>';
    }
  }
  var partyH = '';
  game.party.forEach(function(p) {
    var tc = TYPE_COLORS[p.type] || '#888';
    partyH +=
      '<div class="party-member">' +
        '<img class="pm-sprite" src="' + spriteUrl(p.id) + '" alt="' + p.name + '" onerror="this.style.display=\'none\'">' +
        '<div class="pm-info">' +
          '<div class="pm-name">' + p.name + '</div>' +
          '<div class="pm-level">Lv.' + p.level + ' <span class="pm-type" style="background:' + tc + '">' + p.type + '</span></div>' +
        '</div>' +
      '</div>';
  });
  sb.innerHTML =
    '<h3>Trainer Red</h3>' +
    '<h4>Badges (' + game.badges.length + '/8)</h4>' +
    '<div class="badge-grid">' + badgeH + '</div>' +
    '<h4>Party (' + game.party.length + '/6)</h4>' +
    (partyH || '<div style="color:#666;font-size:8px">No Pokemon yet</div>') +
    '<h4>Bag</h4>' +
    '<div class="bag-item"><img class="bag-icon" src="' + ITEM_BASE + 'potion.png" onerror="this.outerHTML=\'&#x1F48A;\'"> Potions <span class="count">x' + game.bag.potions + '</span></div>' +
    '<div class="bag-item"><img class="bag-icon" src="' + ITEM_BASE + 'oran-berry.png" onerror="this.outerHTML=\'&#x1F347;\'"> Berries <span class="count">x' + game.bag.berries + '</span></div>' +
    '<div class="stat-line">Total level: ' + getTotalLevel() + '<br>Total spins: ' + game.totalSpins + '</div>';

  // Log
  var logEl = document.getElementById('log');
  logEl.innerHTML = game.log.slice(0, 50).map(function(e) {
    return '<div class="log-entry"><span class="log-num">#' + e.num + '</span> ' + e.text + '</div>';
  }).join('');
}

// ===== STARS =====
function createStars() {
  var c = document.getElementById('stars');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
    s.style.animationDelay = Math.random()*2+'s';
    s.style.width = s.style.height = (Math.random()*2+1)+'px';
    c.appendChild(s);
  }
}

// ===== PRELOAD =====
[1,4,7].forEach(function(id) { new Image().src = artworkUrl(id); });

createStars();
</script>
